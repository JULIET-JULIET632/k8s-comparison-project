apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-comparison-app
  labels:
    app: k8s-comparison-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-comparison-app
  template:
    metadata:
      labels:
        app: k8s-comparison-app
    spec:
      containers:
      - name: k8s-comparison-app
        image: juliet237/k8s-comparison-app:v1
        ports:
        - containerPort: 3000
        env:
        - name: DISTRIBUTION
          value: "RKE2"
        - name: STAGE
          value: "multinode"
